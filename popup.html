<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TWINS to Calendar</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      font-size: 13px;
      width: 380px;
      height: 560px;
      background: #f8f9fa;
      color: #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #20678f;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    header .term-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
    }

    #app {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #coursesSection {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .section {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .term-dates {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 6px;
    }

    .term-dates input[type="date"] {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      color: #333;
    }

    .term-dates .separator {
      color: #888;
      font-size: 11px;
    }

    .course-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .course-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .course-item:last-child {
      border-bottom: none;
    }

    .course-item input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .course-info {
      flex: 1;
      min-width: 0;
    }

    .course-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .course-meta {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .course-code {
      font-size: 11px;
      color: #999;
      font-family: monospace;
    }

    .time-badge {
      flex-shrink: 0;
      background: #e8f4f8;
      color: #20678f;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #888;
      font-size: 12px;
      line-height: 1.6;
    }

    .error-state {
      text-align: center;
      padding: 24px 16px;
      color: #c62828;
      font-size: 12px;
      line-height: 1.6;
    }

    .actions {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: white;
    }

    .btn {
      width: 100%;
      padding: 9px 16px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #20678f;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1a5577;
    }

    .btn-primary:disabled {
      background: #aac9d9;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #444;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .date-source {
      font-weight: normal;
      color: #aaa;
      font-size: 10px;
    }

    .date-warning {
      font-size: 11px;
      color: #c62828;
      line-height: 1.6;
    }

    .date-warning code {
      font-family: monospace;
      background: #fce8e8;
      padding: 1px 3px;
      border-radius: 2px;
    }

    .notice {
      font-size: 11px;
      color: #888;
      text-align: center;
      padding: 0 16px 10px;
      background: white;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 8px;
      color: #666;
      font-size: 12px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #ddd;
      border-top-color: #20678f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .count-badge {
      display: inline-block;
      background: #20678f;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: 4px;
      vertical-align: middle;
    }

    #selectAll {
      font-size: 11px;
      color: #20678f;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 6px;
    }

    .kdb-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: #f0f7fa;
      border-bottom: 1px solid #d0e8f0;
      font-size: 11px;
      color: #555;
    }
    .kdb-bar.missing {
      background: #fff8e1;
      border-bottom-color: #ffe082;
      color: #795548;
    }
    .kdb-bar a {
      color: #20678f;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .kdb-bar a:hover { text-decoration: underline; }

    .course-room {
      font-size: 11px;
      color: #20678f;
      margin-top: 1px;
    }

    .howto-toggle {
      width: 100%;
      padding: 8px 16px;
      background: white;
      border: none;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .howto-toggle:hover { background: #f8f8f8; }
    .howto-toggle .arrow { font-size: 10px; transition: transform 0.2s; }
    .howto-toggle.open .arrow { transform: rotate(180deg); }

    .howto-section {
      background: white;
      border-top: 1px solid #f0f0f0;
      padding: 12px 16px;
      display: none;
      flex-shrink: 0;
      max-height: 220px;
      overflow-y: auto;
    }
    .howto-section.open { display: block; }

    .howto-service {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .howto-service:last-child { border-bottom: none; padding-bottom: 0; }

    .service-icon { flex-shrink: 0; }

    .service-body { flex: 1; min-width: 0; }
    .service-name {
      font-size: 12px;
      font-weight: 700;
      color: #333;
      margin-bottom: 5px;
    }

    .steps {
      list-style: none;
      padding: 0;
      counter-reset: step;
    }
    .steps li {
      counter-increment: step;
      font-size: 11px;
      color: #555;
      line-height: 1.5;
      padding-left: 18px;
      position: relative;
      margin-bottom: 2px;
    }
    .steps li::before {
      content: counter(step);
      position: absolute;
      left: 0;
      top: 1px;
      width: 14px;
      height: 14px;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 14px;
      text-align: center;
    }
    .steps code {
      background: #f1f3f4;
      padding: 0 3px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>

  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <h1>TWINS to Calendar</h1>
    <span class="term-badge" id="termBadge">読み込み中…</span>
  </header>

  <div id="kdbBar"></div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      時間割を読み込み中…
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
