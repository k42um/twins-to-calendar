<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TWINS to Calendar – 設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      font-size: 13px;
      background: #f8f9fa;
      color: #333;
      padding: 24px;
      max-width: 560px;
    }

    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #20678f;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card {
      background: white;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .status-ok   { color: #2e7d32; font-weight: 500; }
    .status-none { color: #888; }

    .status-detail {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .file-label:hover { background: #e4e4e4; }

    input[type="file"] { display: none; }

    .file-name {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    .mapping-section {
      margin-top: 14px;
      display: none;
    }
    .mapping-section.visible { display: block; }

    .mapping-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .mapping-row label { font-size: 12px; color: #555; }

    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      background: white;
    }

    .preview {
      margin-top: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      overflow: auto;
      max-height: 120px;
    }

    .preview table {
      border-collapse: collapse;
      font-size: 11px;
      white-space: nowrap;
    }

    .preview th, .preview td {
      border: 1px solid #eee;
      padding: 3px 8px;
    }
    .preview th { background: #f5f5f5; font-weight: 600; }
    .preview .highlight { background: #e8f4f8; }

    .actions { margin-top: 14px; display: flex; gap: 8px; }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary   { background: #20678f; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1a5577; }
    .btn-danger    { background: #fce8e8; color: #c62828; }
    .btn-danger:hover { background: #f8d0d0; }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#20678f" stroke-width="2">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="8" x2="12" y2="12"/>
    <line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  KdB 教室データ設定
</h1>

<!-- 現在の取り込み状況 -->
<div class="card">
  <div class="card-title">取り込み済みデータ</div>
  <div class="status-row">
    <div>
      <div id="statusText" class="status-none">未取り込み</div>
      <div id="statusDetail" class="status-detail"></div>
    </div>
    <button class="btn btn-danger" id="clearBtn" style="display:none">削除</button>
  </div>
</div>

<!-- ファイル取り込み -->
<div class="card">
  <div class="card-title">KdB ファイルを取り込む</div>
  <label class="file-label" for="xlsxInput">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    xlsx ファイルを選択
  </label>
  <input type="file" id="xlsxInput" accept=".xlsx">
  <div class="file-name" id="fileName"></div>

  <div class="mapping-section" id="mappingSection">
    <div class="actions">
      <button class="btn btn-primary" id="importBtn">取り込む</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="options.js"></script>
</body>
</html>
